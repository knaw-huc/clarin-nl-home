version: '3'

services:
  web:
    image: nginx
    volumes:
      - clarin-nl-home-html:/usr/share/nginx/html
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.clarin-nl-home.loadbalancer.server.port=80"
      - "traefik.http.routers.clarin-nl-home.entrypoints=http"
      - "traefik.http.routers.clarin-nl-home.rule=Host(`clarin-nl.sd.di.huc.knaw.nl`)"
  cron:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - clarin-nl-home-html:/app/repo/html

volumes:
  clarin-nl-home-html:

networks:
  traefik-public:
    external: true