version: '3'

services:
  web:
    image: nginx
    volumes:
      - hi-clarin-nl-home-html:/usr/share/nginx/html
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.religious-policies.loadbalancer.server.port=80"
      - "traefik.http.routers.religious-policies.entrypoints=http"
      - "traefik.http.routers.religious-policies.rule=Host(`clarin-nl.sd.di.huc.knaw.nl`)"
  cron:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - hi-clarin-nl-home-html:/app/repo/html

volumes:
  hi-religous-policies-html:

networks:
  traefik-public:
    external: true